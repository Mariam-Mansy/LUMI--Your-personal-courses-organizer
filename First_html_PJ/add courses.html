        <header>
            <nav class="nav">
                <div class="logo" title="LUMI">
                    <img src="imgs/LUMI Logo.png" alt="LUMI">
                </div>
                <ul class="links">
                    <li>
                    <a href="index.html" title="Home"> <img src="imgs/9749450328e93553b1c41cd3ba53c198.jpg" class="nav-icon"> Home</a>
                    </li>
                    <li>
                    <a href="my courses.html" title="My Courses"> <img src="imgs/eff4b5542125bf6adfb6c28ce878a2d8.jpg" class="nav-icon"> My Courses</a>

                </ul>

        

            </nav>
            <div class="addcrs">
                <h2>Add New Courses 📋</h2>
            </div>
        </header>
        <main>
            <section class="add_section">
                <form>
                    <div class="input">
                    <label>Course Name</label>
                    <input type="text" placeholder="Enter Course Name:" required>
                    </div>
                    <div class="input">
                        <label>Mark</label>
                        <input type="text" placeholder="Enter Course Mark (if unknown, write 'Unknown'):" required>
                    </div>
                    <div class="input">
                        <label>Status</label>
                        <select>
                            <option value="Passed">Completed(Passed)</option>
                            <option value="In Progress">In Progress</option>
                            <option value="failed">Failed</option>
                        </select>
                    </div>
                    <button type="submit" class="addbtn">submit</button>
                </form>
            </section>
            <footer>
                <p>copyright &copy; <strong> Mariam Nabigh 2026</strong></p>
            </footer>
        </main>
    </body>
